<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta-RC | 創世記の建築・収益解析</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent: #d4af37; /* 誠実なゴールド */
            --text: #ffffff;
            --shadow: rgba(212, 175, 55, 0.8);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: "Hiragino Mincho ProN", "MS PMincho", serif; /* エレガントな明朝体 */
            overflow-x: hidden;
        }

        /* 背景動画: 宇宙の星が流れる */
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; opacity: 0.6;
        }

        /* フェードインアニメーション */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
        }

        /* Meta_RC_Pulse ゴールドオーラ */
        .pulse-title {
            font-size: 4.5rem; font-weight: bold;
            color: var(--text);
            text-shadow: 0 0 15px var(--shadow), 0 0 30px var(--shadow);
            margin-bottom: 20px;
            animation: fadeInUp 2s ease-out forwards;
        }

        .main-message {
            font-size: 1.8rem; line-height: 1.6;
            margin-bottom: 50px;
            animation: fadeInUp 2.5s ease-out forwards;
            animation-delay: 0.5s; opacity: 0;
            text-shadow: 2px 2px 4px #000; /* 文字を見やすく */
        }

        /* 提案内容カード */
        .proposal-section {
            padding: 100px 20px;
            background: rgba(0, 0, 0, 0.7);
            animation: fadeInUp 3s ease-out forwards;
            animation-delay: 1s; opacity: 0;
        }

        .proposal-container { max-width: 900px; margin: 0 auto; }
        
        .proposal-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--accent);
            padding: 40px; border-radius: 20px; margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .proposal-card h3 {
            color: var(--accent); font-size: 1.8rem; margin-top: 0;
            border-bottom: 1px solid var(--accent); display: inline-block; padding-bottom: 5px;
        }

        .proposal-card p { font-size: 1.2rem; line-height: 1.8; margin-top: 20px; }

        /* CTAボタン */
        .cta-btn {
            display: inline-block; padding: 20px 80px;
            border: 2px solid var(--accent); border-radius: 50px;
            color: var(--accent); text-decoration: none;
            font-size: 1.5rem; font-weight: bold;
            background: rgba(0,0,0,0.6);
            transition: 0.4s;
            box-shadow: 0 0 20px var(--shadow);
        }
        .cta-btn:hover { background: var(--accent); color: #000; }

        @media (max-width: 768px) {
            .pulse-title { font-size: 2.5rem; }
            .main-message { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <video class="video-background" autoplay loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-night-sky-moving-slowly-36423-large.mp4" type="video/mp4">
    </video>

    <section class="hero">
        <h1 class="pulse-title">Meta_RC_Pulse</h1>
        <div class="main-message">
            未開拓な投資<br>
            <span style="font-size: 1.2rem; color: #888;">あるいは</span><br>
            大地震から家族を守る家<br><br>
            <span style="font-size: 1.4rem; color: var(--accent);">最先端技術を集約して的確な建築を提案します</span>
        </div>
        <a href="https://be8cw5a4wwszku3cxujf3s.streamlit.app" target="_blank" class="cta-btn">創世記 解析エンジンを起動</a>
    </section>

    <section class="proposal-section">
        <div class="proposal-container">
            <h2 style="text-align:center; color:var(--accent); font-size:2.5rem; margin-bottom:60px;">提案内容</h2>
            
            <div class="proposal-card">
                <h3>投資家様には</h3>
                <p>AI による35年間ローン返済、税金、修繕、管理費を差し引いた<br><b>毎月の純利益を確実にお振込</b>いたします。</p>
            </div>

            <div class="proposal-card">
                <h3>住居希望様には</h3>
                <p>大地震によるライフライン崩壊にも耐えうる<br><b>半自給自足可能な耐久性住宅</b>をご提案します。</p>
            </div>
        </div>
    </section>

</body>
</html>
